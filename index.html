<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuNuevoNombre | Vehículos e Info de Mercado</title>
    <style>
        /* --- ESTILOS AL ESTILO MARKETPLACE / MERCADO LIBRE --- */
        :root {
            --ml-yellow: #fff159; /* El color característico del header */
            --bg-light: #ebebeb;  /* Fondo gris claro típico de las plataformas de comercio */
            --text-dark: #333333;
            --text-gray: #666666;
            --price-color: #333333;
            --link-blue: #3483fa; /* Azul de botones y enlaces de ML */
            --btn-green: #00a650; /* Verde de contacto/compra */
        }

        body {
            font-family: "Proxima Nova", -apple-system, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* BARRA SUPERIOR ESTILO ML */
        header {
            background-color: var(--ml-yellow);
            padding: 0.8rem 2rem;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* CAMBIA TU NOMBRE AQUÍ (ESTILO LOGO) */
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2d3277;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        /* Buscador integrado en la barra */
        .search-box {
            display: flex;
            flex-grow: 1;
            max-width: 600px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .search-box select {
            border: none;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            outline: none;
            background: white;
            border-right: 1px solid #ddd;
            color: var(--text-gray);
        }

        .search-box button {
            background: white;
            border: none;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--link-blue);
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #f5f5f5;
        }

        nav a {
            color: #333;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.9rem;
        }
        nav a:hover { color: var(--link-blue); }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            max-width: 1200px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 3fr 1fr; /* Diseño de catálogo a la izquierda, noticias a la derecha */
            gap: 1.5rem;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        /* GRID DE PRODUCTOS COMERCIALES */
        .grid-autos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .card-auto {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.1);
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card-auto:hover {
            box-shadow: 0 7px 16px 0 rgba(0,0,0,0.15);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
        }

        .card-content {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--price-color);
            margin-bottom: 0.3rem;
        }

        .card-title {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-gray);
            font-weight: 400;
            line-height: 1.3;
        }
        
        .card-specs {
            font-size: 0.8rem;
            color: #999999;
            margin-bottom: 1rem;
        }

        .btn-contact {
            display: block;
            text-align: center;
            background-color: var(--link-blue);
            color: white;
            text-decoration: none;
            padding: 0.6rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: auto;
            transition: background 0.2s;
        }
        .btn-contact:hover { background-color: #2968c8; }

        /* BARRA LATERAL DE NOTICIAS / INFO */
        .sidebar-news {
            background: white;
            padding: 1.2rem;
            border-radius: 4px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.1);
            height: fit-content;
        }

        .mini-noticia {
            border-bottom: 1px solid #eee;
            padding: 0.8rem 0;
        }
        .mini-noticia:last-child { border: none; }
        .noticia-tag { font-size: 0.7rem; color: #e67e22; text-transform: uppercase; font-weight: bold; }
        .mini-noticia h4 { margin: 0.3rem 0; font-size: 0.95rem; font-weight: 600; }
        .mini-noticia h4 a { color: var(--text-dark); text-decoration: none; }
        .mini-noticia h4 a:hover { color: var(--link-blue); }

        .no-results { grid-column: 1 / -1; text-align: center; color: var(--text-gray); padding: 3rem; }
    </style>
</head>
<body>

    <!-- HEADER ESTILO MERCADO LIBRE -->
    <header>
        <div class="header-container">
            <div class="header-top">
                <!-- 1. AQUÍ CAMBIAS EL NOMBRE DE TU PÁGINA -->
                <a href="#" class="logo">TuMarcaAutos</a> 
                
                <!-- Buscador de Categorías directo -->
                <div class="search-box">
                    <select id="categorySelect">
                        <option value="todos">Todas las categorías</option>
                        <option value="electrico">Eléctricos</option>
                        <option value="suv">SUVs</option>
                        <option value="sedan">Sedanes</option>
                    </select>
                    <button onclick="filtrarVehiculos()">Buscar</button>
                </div>
            </div>
            <nav>
                <a href="#">Vehículos</a>
                <a href="#">Informes de Mercado</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </header>

    <!-- CONTENIDO GENERAL -->
    <main class="main-container">
        
        <!-- COLUMNA IZQUIERDA: INVENTARIO -->
        <section>
            <div class="section-title">Publicaciones Destacadas</div>
            <div class="grid-autos" id="contenedorAutos">
                <!-- Cargados dinámicamente -->
            </div>
        </section>

        <!-- COLUMNA DERECHA: NOTICIAS / TENDENCIAS -->
        <aside class="sidebar-news">
            <div class="section-title" style="font-size: 1.1rem;">Info del Mercado</div>
            
            <div class="mini-noticia">
                <span class="noticia-tag">Comparativas</span>
                <h4><a href="#">Duelo SUV Eléctrico: Nuevas alternativas del mercado</a></h4>
            </div>

            <div class="mini-noticia">
                <span class="noticia-tag">Tecnología</span>
                <h4><a href="#">¿Qué es el HUD (Head-Up Display) y cómo se activa?</a></h4>
            </div>

            <div class="mini-noticia">
                <span class="noticia-tag">Análisis</span>
                <h4><a href="#">Guía de baterías: Rendimiento y autonomía real</a></h4>
            </div>
        </aside>

    </main>

    <script>
        // BASE DE DATOS DE VEHÍCULOS
        const inventario = [
            {
                titulo: "SUV Eléctrico Inteligente Tech-Full",
                categoria: "electrico",
                precio: 42900,
                imagen: "https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=500",
                datos: "2026 | 0 km | Auton. 500km"
            },
            {
                titulo: "Sedán Ejecutivo Confort STD",
                categoria: "sedan",
                precio: 31500,
                imagen: "https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=500",
                datos: "2025 | 12,500 km | Híbrido"
            },
            {
                titulo: "CrossOver Urbano Active Eco",
                categoria: "suv",
                precio: 24900,
                imagen: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=500",
                datos: "2024 | 34,000 km | Nafta"
            },
            {
                titulo: "Deportivo Eléctrico Performance GT",
                categoria: "electrico",
                precio: 68000,
                imagen: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=500",
                datos: "2026 | 0 km | 90kWh"
            }
        ];

        function renderizarAutos(listaAutos) {
            const contenedor = document.getElementById('contenedorAutos');
            contenedor.innerHTML = "";

            if(listaAutos.length === 0) {
                contenedor.innerHTML = `<div class="no-results">No hay publicaciones que coincidan.</div>`;
                return;
            }

            listaAutos.forEach(auto => {
                const tarjeta = `
                    <article class="card-auto">
                        <img src="${auto.imagen}" alt="${auto.titulo}" class="card-img">
                        <div class="card-content">
                            <div class="card-price">$ ${auto.precio.toLocaleString()}</div>
                            <h3 class="card-title">${auto.titulo}</h3>
                            <div class="card-specs">${auto.datos}</div>
                            <a href="https://wa.me/tuNumeroAqui" target="_blank" class="btn-contact">Ver detalles / Contactar</a>
                        </div>
                    </article>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        function filtrarVehiculos() {
            const categoriaSeleccionada = document.getElementById('categorySelect').value;
            const autosFiltrados = inventario.filter(auto => {
                return (categoriaSeleccionada === 'todos' || auto.categoria === categoriaSeleccionada);
            });
            renderizarAutos(autosFiltrados);
        }

        // Carga inicial
        renderizarAutos(inventario);
    </script>

</body>
</html>
